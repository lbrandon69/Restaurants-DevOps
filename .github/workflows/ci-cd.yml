name: CI/CD — Restaurant API

permissions:
  contents: write

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - '**'

env:
  IMAGE_NAME: chetane/restaurants-api
  AZURE_APP_NAME: aci-restaurant-api

jobs:
  # ==========================================
  # JOB 1 : COMPILATION ET TESTS UNITAIRES
  # ==========================================
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code source
        uses: actions/checkout@v4

      - name: Installer .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Mettre en cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restaurer les dépendances
        run: dotnet restore Restaurants.Administration.sln

      - name: Compiler le projet
        run: dotnet build Restaurants.Administration.sln --configuration Release --no-restore

      - name: Exécuter les tests
        run: dotnet test Restaurants.Administration.sln --configuration Release --no-build --verbosity normal

  # ==========================================
  # JOB 2 : BUILD ET PUBLICATION DOCKER HUB
  # ==========================================
  docker-publish:
    name: Docker Build & Publish
    runs-on: ubuntu-latest
    needs: build-and-test
    if: |
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    outputs:
      image-tag: ${{ steps.image-tag.outputs.image_tag }}
    steps:
      - name: Checkout du code source
        uses: actions/checkout@v4

      - name: Configurer Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Vérifier la disponibilité du secret DOCKERHUB_TOKEN
        run: |
          if [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "ERROR: DOCKERHUB_TOKEN est vide"
            exit 1
          else
            echo "DOCKERHUB_TOKEN présent"
          fi

      - name: Connexion à Docker Hub
        uses: docker/login-action@v3
        with:
          username: chetane
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Générer les tags et métadonnées
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Builder et pousser l'image Docker
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Presentation/Restaurants.Presentation.Api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extraire le tag principal pour la mise à jour du compose
        id: image-tag
        run: |
          MAIN_TAG=$(echo "${{ steps.meta.outputs.tags }}" | head -n 1)
          echo "image_tag=$MAIN_TAG" >> $GITHUB_OUTPUT

  # ==========================================
  # JOB 3 : DEPLOIEMENT GITOPS (COMPOSE)
  # ==========================================
  deploy:
    name: Deploy Local Compose
    runs-on: ubuntu-latest
    needs: docker-publish
    environment:
      name: ${{ startsWith(github.ref, 'refs/tags/v') && 'production' || 'staging' }}
    steps:
      - name: Checkout du code source
        uses: actions/checkout@v4

      - name: Récupérer le tag de l'image publié
        id: deploy-tag
        run: |
          echo "image_tag=${{ needs.docker-publish.outputs.image-tag }}" >> $GITHUB_OUTPUT
          echo "deploy_env=${{ startsWith(github.ref, 'refs/tags/v') && 'production' || 'staging' }}" >> $GITHUB_OUTPUT

      - name: Mettre à jour compose.yaml avec le nouveau tag
        run: |
          sed -E -i "s|^[[:space:]]*image: .*|image: ${{ steps.deploy-tag.outputs.image_tag }}|" compose.yaml

      - name: Committer la mise à jour du compose.yaml
        run: |
          git config user.name 'GitHub Actions'
          git config user.email 'actions@github.com'
          git add compose.yaml
          git diff --quiet --cached || git commit -m "deploy(${{ steps.deploy-tag.outputs.deploy_env }}): image ${{ steps.deploy-tag.outputs.image_tag }}"
          git push

  # ==========================================
  # JOB 4 : DEPLOIEMENT INFRASTRUCTURE AZURE
  # ==========================================
  deploy-azure:
    name: Deploy Azure Container App
    runs-on: ubuntu-latest
    needs: docker-publish
    if: |
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    steps:
      - name: Checkout du code source
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy container image to Azure Container App
        uses: azure/container-apps-deploy-action@v2
        with:
          containerAppName: ${{ env.AZURE_APP_NAME }}
          resourceGroup: rg-restaurant-prod
          imageToDeploy: ${{ needs.docker-publish.outputs.image-tag }}
          location: francecentral
          registryUrl: docker.io
          registryUsername: chetane
          registryPassword: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Configure Container App secrets
        run: |
          az containerapp secret set \
            --name ${{ env.AZURE_APP_NAME }} \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --secrets ConnectionStrings--RestaurantsDb="${{ secrets.SQL_CONNECTION_STRING }}" BlobStorage--ConnectionString="${{ secrets.BLOB_CONNECTION_STRING }}"

      - name: Update Container App env vars to use secret refs
        run: |
          az containerapp update \
            --name ${{ env.AZURE_APP_NAME }} \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --set-env-vars "ConnectionStrings__RestaurantsDb=secretref:ConnectionStrings--RestaurantsDb" "BlobStorage__ConnectionString=secretref:BlobStorage--ConnectionString"