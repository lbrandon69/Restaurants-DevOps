’╗┐services:
  restaurants.presentation.api:
image: chetane/restaurants-api:main
    environment:
      - ConnectionStrings__RestaurantsDb=${DB_CONNECTION_STRING}
      - BlobStorage__ConnectionString=${BLOB_CONNECTION_STRING}
      - ASPNETCORE_ENVIRONMENT=${APP_ENV:-Production}

    depends_on:
      - sqlserver-container
      - azure-storage-emulator
    ports:
      - "${API_PORT:-5001}:8080" # Expose l'API sur le port 5001
    networks:
      - restaurant-network
    restart: unless-stopped


  sqlserver-container:
image: chetane/restaurants-api:main
    platform: linux/amd64
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${SQL_SA_PASSWORD:-restaurantDb123!}
      - MSSQL_PID=Express
    ports:
      - "${SQL_PORT:-1433}:1433" # Expose SQL Server sur le port 1433
    volumes:
      - sqlserver-data:/var/opt/mssql
    networks:
      - restaurant-network
    restart: unless-stopped


  azure-storage-emulator:
image: chetane/restaurants-api:main
    container_name: azurite
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"
    volumes:
      - azurite-data:/data
    environment:
      - AZURITE_ACCOUNTS=${AZURITE_ACCOUNTS:-devstoreaccount1:restaurantStore123!}
    networks:
      - restaurant-network

networks:
  restaurant-network:
    driver: bridge

volumes:
  sqlserver-data:
  azurite-data: